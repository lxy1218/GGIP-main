<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title> 网络设备ip 地址表</title>
<style>
*{box-sizing: border-box;}
body{padding:20px;font-family:"Microsoft Yahei",sans-serif;}
h2{text-align:center;color:#222;}
table{border-collapse: collapse;width:100%;font-size:14px;}
th,td{border:1px solid #666;padding:7px 6px;text-align:center;}
th{background:#2c3e50;color:#fff;}
tr:nth-child(even){background:#f7f9fc;}
</style>
</head>
<body>
<h2>网络设备ip 地址表</h2>
<table>
<thead>
<tr>
    <th>序号</th>
    <th>设备名称</th>
    <th>IP地址</th>
    <th>子网掩码</th>
    <th>网关</th>
    <th>DNS</th>
</tr>
</thead>
<tbody>
<tr><td>1</td><td>RACK-F01</td><td>192.168.1.1</td><td>255.255.255.0</td><td>192.168.1.254</td><td>8.8.8.8</td></tr>
<tr><td>2</td><td>RACK-F01</td><td>192.168.1.2</td><td>255.255.255.0</td><td>192.168.1.254</td><td>8.8.8.8</td></tr>
</tbody>
</table>
</body>
</html>
